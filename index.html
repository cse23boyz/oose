<!DOCTYPE html>
<html>
<head>
    <title>Foreign Trading System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🌍 Foreign Trading System</h1>

    <!-- LOGIN -->
    <div id="login" class="card">
        <h2>Trader Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" style="display:none;">

        <div class="card">
            <h2>Dashboard</h2>
            <button onclick="showItems()">View Commodities</button>
        </div>

        <!-- ITEMS -->
        <div id="items" class="grid"></div>

        <!-- ORDER -->
        <div id="orderSection" class="card" style="display:none;">
            <h3>Place Order</h3>
            <p id="selectedItem"></p>
            <input type="number" id="quantity" placeholder="Enter Quantity">
            <button onclick="placeOrder()">Generate Bill</button>
        </div>

        <!-- BILL -->
        <div id="billSection" class="card" style="display:none;">
            <h3>Bill Details</h3>
            <p id="bill"></p>
            <button onclick="pay()">Pay Now</button>
        </div>

        <!-- REPORT -->
        <div class="card">
            <h3>📊 Reports</h3>
            <button onclick="generateReport('month')">1 Month Report</button>
            <button onclick="generateReport('year')">1 Year Report</button>
        </div>

        <button class="logout" onclick="logout()">Logout</button>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
