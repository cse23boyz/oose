<!DOCTYPE html>
<html>
<head>
    <title>Foreign Trading System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>🌍 Foreign Trading</h2>
</div>

<div class="container">

    <!-- LOGIN -->
    <div id="login" class="card glass">
        <h2>Trader Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" style="display:none;">

        <div class="card glass">
            <h2>Dashboard</h2>
            <input type="text" id="search" placeholder="Search item..." onkeyup="filterItems()">
            <select id="category" onchange="filterItems()">
                <option value="all">All</option>
                <option value="metal">Metals</option>
                <option value="agri">Agriculture</option>
                <option value="energy">Energy</option>
            </select>
            <button onclick="showItems()">Show Items</button>
        </div>

        <!-- ITEMS -->
        <div id="items" class="grid"></div>

        <!-- ORDER -->
        <div id="orderSection" class="card glass" style="display:none;">
            <h3>🛒 Place Order</h3>
            <p id="selectedItem"></p>
            <input type="number" id="quantity" placeholder="Enter Quantity">
            <button onclick="placeOrder()">Generate Bill</button>
        </div>

        <!-- BILL -->
        <div id="billSection" class="card glass" style="display:none;">
            <h3>🧾 Bill</h3>
            <p id="bill"></p>
            <button onclick="pay()">Pay Now</button>
        </div>

        <!-- ORDER SUMMARY -->
        <div class="card glass">
            <h3>📦 Order Summary</h3>
            <div id="summary"></div>
        </div>

        <!-- REPORT -->
        <div class="card glass">
            <h3>📊 Reports</h3>
            <button onclick="generateReport('month')">1 Month</button>
            <button onclick="generateReport('year')">1 Year</button>
        </div>

        <button class="logout" onclick="logout()">Logout</button>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
